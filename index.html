<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韩国税务局网站 Requestly规则生成器</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --primary-dark: #1d4ed8;
      --success: #10b981;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius: 8px;
      --radius-lg: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 32px 0;
      box-shadow: var(--shadow-lg);
    }

    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover:not(:disabled) {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover:not(:disabled) {
      background: var(--danger-hover);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .card-title .icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 14px;
    }

    .form-group label .required {
      color: var(--danger);
      margin-left: 4px;
    }

    input[type="text"],
    input[type="number"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .rule-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .rule-item:hover {
      box-shadow: var(--shadow);
    }

    .rule-header {
      background: var(--surface-alt);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rule-header h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .rule-content {
      padding: 18px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      background: #dbeafe;
      color: var(--primary);
    }

    .badge.green {
      background: #d1fae5;
      color: #065f46;
    }

    .field-mapping {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .field-mapping th {
      background: var(--surface-alt);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .field-mapping td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .field-mapping tr:last-child td {
      border-bottom: none;
    }

    .field-mapping input {
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-light);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 14px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    .code-preview {
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px;
      border-radius: var(--radius);
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Tab 样式 */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
      padding-bottom: 0;
    }

    .tab-item {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-item:hover {
      color: var(--primary);
    }

    .tab-item.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      header .container {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      header h1 {
        font-size: 22px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div>
        <h1>📋 韩国税务局网站 Requestly规则生成器</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-success" onclick="exportRules()" id="exportBtn" disabled>
          📤 导出规则
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 规则 Tab 切换 -->
    <div class="card" style="padding-bottom: 0;">
      <div class="tab-bar" id="tabBar">
        <button class="tab-item active">加载中...</button>
      </div>
    </div>

    <!-- 基本信息 -->
    <div class="card">
      <h2 class="card-title">
        <span class="icon">⚙️</span>
        基本信息
      </h2>
      <div class="form-row">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>规则描述</label>
          <input type="text" id="ruleDesc" placeholder="可选，简要说明规则用途">
        </div>
      </div>
    </div>

    <!-- 响应修改规则 -->
    <div class="card">
      <h2 class="card-title">
        <span class="icon">✏️</span>
        响应修改规则
      </h2>
      <div id="responseGroupsList">
        <div class="empty-state" id="emptyResponseGroups">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <p>请选择规则查看</p>
        </div>
      </div>
    </div>

    <!-- 预览与导出 -->
    <div class="card">
      <h2 class="card-title">
        <span class="icon">👁️</span>
        预览生成的代码
        <div style="margin-left: auto; display: flex; gap: 8px;">
          <button class="btn btn-secondary btn-sm" onclick="generatePreview()">
            刷新预览
          </button>
          <button class="btn btn-primary btn-sm" onclick="copyCode()" id="copyBtn" disabled>
            📋 复制
          </button>
        </div>
      </h2>
      <div class="code-preview" id="codePreview">请选择规则查看</div>
    </div>
  </main>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // ==================== 数据存储 ====================
    let responseGroups = [];
    let allRules = []; // 存储所有规则
    let currentRuleIndex = -1; // 当前选中的规则索引
    let matchUrl = 'https://tecr.hometax.go.kr/wqAction.do'; // 默认 URL 匹配条件
    let currentMatchUrl = ''; // 当前规则的 URL 匹配条件
    let ruleCache = {}; // 缓存每个规则的编辑状态 { index: { responseGroups, ruleDesc } }

    // ==================== Toast 提示 ====================
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ==================== 自动加载规则文件 ====================
    async function loadRules() {
      try {
        const resp = await fetch('./rules/rules.json');
        if (!resp.ok) throw new Error('无法加载 rules.json');
        const rules = await resp.json();
        allRules = rules;

        // 渲染 Tab 按钮
        const tabBar = document.getElementById('tabBar');
        tabBar.innerHTML = rules.map((r, i) =>
          `<button class="tab-item ${i === 0 ? 'active' : ''}" onclick="switchRule(${i})">${r.name || '未命名规则'}</button>`
        ).join('');

        // 默认加载第一个规则
        if (rules.length > 0) {
          switchRule(0);
        } else {
          tabBar.innerHTML = '<button class="tab-item active">无可用规则</button>';
        }
      } catch (err) {
        console.error('加载规则失败:', err);
        document.getElementById('tabBar').innerHTML =
          '<button class="tab-item active">加载失败，请确保通过 http-server 访问</button>';
      }
    }

    // ==================== 切换规则 ====================
    function switchRule(index) {
      index = parseInt(index);
      if (isNaN(index) || index < 0 || index >= allRules.length) return;

      // 保存当前规则的编辑状态到缓存
      if (currentRuleIndex >= 0) {
        ruleCache[currentRuleIndex] = {
          responseGroups: JSON.parse(JSON.stringify(responseGroups)),
          ruleDesc: document.getElementById('ruleDesc').value
        };
      }

      // 更新 Tab 激活状态
      const tabs = document.querySelectorAll('.tab-item');
      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === index);
      });

      currentRuleIndex = index;
      const rule = allRules[index];

      // 尝试从缓存恢复
      if (ruleCache[index]) {
        responseGroups = JSON.parse(JSON.stringify(ruleCache[index].responseGroups));
        document.getElementById('ruleDesc').value = ruleCache[index].ruleDesc || '';
      } else {
        // 首次加载，从原始数据解析
        document.getElementById('ruleDesc').value = rule.description || '';
        currentMatchUrl = rule.pairs?.[0]?.source?.value || matchUrl;

        const javascript = rule.pairs?.[0]?.response?.value;
        if (javascript) {
          parseJavaScriptToGroups(javascript);
        } else {
          responseGroups = [];
        }
      }

      renderResponseGroups();
      generatePreview();
      updateExportButton();
    }

    // ==================== 渲染规则组列表 ====================
    function renderResponseGroups() {
      const container = document.getElementById('responseGroupsList');
      const emptyState = document.getElementById('emptyResponseGroups');

      if (responseGroups.length === 0) {
        container.innerHTML = '';
        container.appendChild(emptyState);
        emptyState.style.display = 'block';
        return;
      }

      container.innerHTML = responseGroups.map((group, groupIndex) => `
        <div class="rule-item" style="margin-bottom: 16px;">
          <div class="rule-header">
            <div>
              <h4>${group.name}</h4>
              <div style="display: flex; gap: 8px; margin-top: 4px;">
                ${group.actionId ? `<span class="badge">${group.actionId}</span>` : ''}
                ${group.dataPath ? `<span class="badge green">${group.dataPath}</span>` : ''}
                <span class="badge">${group.fields.length} 个字段</span>
              </div>
            </div>
          </div>
          <div class="rule-content">
            ${group.fields.length > 0 ? `
              <table class="field-mapping">
                <thead>
                  <tr>
                    <th>字段说明</th>
                    <th>字段值</th>
                  </tr>
                </thead>
                <tbody>
                  ${group.fields.map((field, fieldIndex) => `
                    <tr>
                      <td>${field.comment || '-'}</td>
                      <td>
                        <input type="text" value="${field.value}" 
                               onchange="updateFieldValue(${groupIndex}, ${fieldIndex}, this.value)"
                               style="width: 100%; min-width: 200px;">
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            ` : '<p style="color: var(--text-light); font-size: 13px;">无字段</p>'}
          </div>
        </div>
      `).join('');
    }

    // ==================== 更新字段值 ====================
    function updateFieldValue(groupIndex, fieldIndex, newValue) {
      responseGroups[groupIndex].fields[fieldIndex].value = newValue;
      showToast('字段值已更新');
    }

    // ==================== 生成 JavaScript 代码 ====================
    function generateJavaScript() {
      // 判断是否为简单规则（无 actionId）
      const isSimpleRule = responseGroups.length === 1 && !responseGroups[0].actionId;

      let code = `function modifyResponse(args) {\n`;
      code += `  const {\n`;
      code += `    method,\n`;
      code += `    url,\n`;
      code += `    response,\n`;
      code += `    responseType,\n`;
      code += `    requestHeaders,\n`;
      code += `    requestData,\n`;
      code += `    responseJSON,\n`;
      code += `  } = args;\n`;
      code += `  // Change response below depending upon request attributes received in args\n`;
      code += `  var res = JSON.parse(response);\n`;

      if (isSimpleRule) {
        // 简单规则：直接输出条件判断和赋值
        const group = responseGroups[0];
        // 从原始规则中获取条件表达式
        const rule = allRules[currentRuleIndex];
        const originalCode = rule.pairs?.[0]?.response?.value || '';
        const condMatch = originalCode.match(/if\s*\((.+?)\)\s*\{/);
        const condition = condMatch ? condMatch[1] : 'true';

        code += `  if (${condition}) {\n`;

        group.fields.forEach(field => {
          if (field.comment) code += `    // ${field.comment}\n`;
          const valueStr = field.type === 'number' ? field.value : `"${field.value}"`;
          if (field.dataPath) {
            code += `    res.${field.dataPath}.${field.name} = ${valueStr};\n`;
          } else {
            code += `    res.${field.name} = ${valueStr};\n`;
          }
        });

        code += `  }\n`;
      } else {
        // actionId 多分支规则
        code += `  const uri = new URL(url);\n`;
        code += `  const actionId = uri.searchParams.get("actionId");\n\n`;

        responseGroups.forEach((group, index) => {
          code += `  if (actionId == "${group.actionId}") {\n`;
          code += `    // === ${group.name} ===\n`;

          const fieldsByPath = {};
          group.fields.forEach(field => {
            const path = field.dataPath || '';
            if (!fieldsByPath[path]) fieldsByPath[path] = [];
            fieldsByPath[path].push(field);
          });

          Object.entries(fieldsByPath).forEach(([dataPath, fields]) => {
            let target, varDecl = '', varName = '';

            if (dataPath) {
              if (dataPath.includes('[')) {
                target = `res.${dataPath}`;
              } else if (dataPath.includes('List') || dataPath.includes('list') || dataPath.endsWith('s')) {
                varName = dataPath.replace(/List$/, '') || dataPath.substring(0, 20);
                varDecl = `    const ${varName} = res.${dataPath}?.[0] ?? {};\n`;
                target = varName;
              } else {
                target = `res.${dataPath}`;
              }
            } else {
              target = 'res';
            }

            if (varDecl) { code += varDecl; code += `\n`; }

            fields.forEach(field => {
              if (field.comment) code += `    // ${field.comment}\n`;
              const valueStr = field.type === 'number' ? field.value : `"${field.value}"`;
              code += `    ${target}.${field.name} = ${valueStr};\n`;
            });

            if (varDecl && dataPath) {
              code += `\n    res.${dataPath} = [${varName}];\n`;
            }

            if (Object.keys(fieldsByPath).length > 1) code += `\n`;
          });

          if (group.actionId === 'ATECRCBA001R02') {
            code += `    res.pageInfoVO.totalCount = 1;\n`;
            code += `    res.totalCount = 1;\n`;
          }

          code += `  }`;
          if (index < responseGroups.length - 1) code += ` else`;
          code += `\n\n`;
        });
      }

      code += `  return JSON.stringify(res);\n`;
      code += `}`;

      return code;
    }

    // ==================== 预览代码 ====================
    function generatePreview() {
      if (responseGroups.length === 0) {
        document.getElementById('codePreview').textContent = '请先导入规则文件';
        document.getElementById('copyBtn').disabled = true;
        return;
      }

      const code = generateJavaScript();
      document.getElementById('codePreview').textContent = code;
      document.getElementById('copyBtn').disabled = false;
    }

    // ==================== 复制代码 ====================
    function copyCode() {
      const code = document.getElementById('codePreview').textContent;
      if (!code || code === '请先导入规则文件') return;

      navigator.clipboard.writeText(code).then(() => {
        showToast('代码已复制到剪贴板');
      }).catch(() => {
        // 降级方案：使用 textarea
        const textarea = document.createElement('textarea');
        textarea.value = code;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('代码已复制到剪贴板');
      });
    }

    // ==================== 导出规则 ====================
    function generateRuleJSONForIndex(index) {
      const rule = allRules[index];

      // 优先使用缓存中的编辑数据，否则使用当前数据
      let groups, desc;
      if (ruleCache[index]) {
        groups = ruleCache[index].responseGroups;
        desc = ruleCache[index].ruleDesc || '';
      } else if (index === currentRuleIndex) {
        groups = responseGroups;
        desc = document.getElementById('ruleDesc').value;
      } else {
        // 未访问过的规则，从原始数据解析
        const javascript = rule.pairs?.[0]?.response?.value;
        if (!javascript) return null;
        const tempGroups = [];
        const hasActionId = /actionId\s*==\s*"/.test(javascript);
        // 临时解析
        const origGroups = responseGroups;
        const origIndex = currentRuleIndex;
        currentRuleIndex = index;
        if (hasActionId) {
          parseActionIdRule(javascript);
        } else {
          parseSimpleRule(javascript);
        }
        tempGroups.push(...responseGroups);
        responseGroups = origGroups;
        currentRuleIndex = origIndex;
        groups = tempGroups;
        desc = rule.description || '';
      }

      if (!groups || groups.length === 0) return null;

      // 临时设置 responseGroups 和 currentRuleIndex 来生成代码
      const origGroups = responseGroups;
      const origIndex = currentRuleIndex;
      const origMatchUrl = currentMatchUrl;
      responseGroups = groups;
      currentRuleIndex = index;
      currentMatchUrl = rule.pairs?.[0]?.source?.value || matchUrl;

      const javascript = generateJavaScript();

      // 恢复
      responseGroups = origGroups;
      currentRuleIndex = origIndex;
      currentMatchUrl = origMatchUrl;

      return {
        "createdBy": rule.createdBy || "browserstack-10930584",
        "creationDate": rule.creationDate || Date.now(),
        "currentOwner": rule.currentOwner || "browserstack-10930584",
        "description": desc,
        "groupId": rule.groupId || "",
        "id": rule.id || `Response_${Math.random().toString(36).substr(2, 5)}`,
        "isSample": false,
        "lastModifiedBy": rule.lastModifiedBy || "browserstack-10930584",
        "modificationDate": Date.now(),
        "name": rule.name || '未命名规则',
        "objectType": "rule",
        "pairs": [{
          "id": rule.pairs?.[0]?.id || Math.random().toString(36).substr(2, 5),
          "response": {
            "resourceType": "restApi",
            "statusCode": "",
            "type": "code",
            "value": javascript
          },
          "source": {
            "key": "Url",
            "operator": "Contains",
            "value": currentMatchUrl || matchUrl
          }
        }],
        "ruleType": "Response",
        "schemaVersion": "3.0.0",
        "status": "Active"
      };
    }

    function exportRules() {
      if (allRules.length === 0) {
        showToast('没有可导出的规则', 'error');
        return;
      }

      const rules = [];
      for (let i = 0; i < allRules.length; i++) {
        const ruleJSON = generateRuleJSONForIndex(i);
        if (ruleJSON) rules.push(ruleJSON);
      }

      if (rules.length === 0) {
        showToast('生成规则失败', 'error');
        return;
      }

      const blob = new Blob([JSON.stringify(rules, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'rules.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showToast('导出成功');
    }

    // ==================== 导入规则 ====================
    function importRules() {
      document.getElementById('fileInput').click();
    }

    function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const rules = JSON.parse(e.target.result);
          if (!rules || !rules.length || !rules[0].pairs) {
            throw new Error('无效的规则文件格式');
          }

          const rule = rules[0];

          // 填充基本信息
          document.getElementById('ruleName').value = rule.name || '';
          document.getElementById('ruleDesc').value = rule.description || '';

          // 解析 JavaScript 代码
          const javascript = rule.pairs[0]?.response?.value;
          if (javascript) {
            console.log('原始 JavaScript 代码长度:', javascript.length);
            console.log('原始 JavaScript 代码前200字符:', javascript.substring(0, 200));
            parseJavaScriptToGroups(javascript);
            console.log('解析后的 responseGroups:', responseGroups);
          }

          renderResponseGroups();
          generatePreview();
          updateExportButton();
          showToast('规则导入成功');
        } catch (err) {
          console.error(err);
          showToast('导入失败：' + err.message, 'error');
        }
      };
      reader.readAsText(file);

      // 清空文件输入
      event.target.value = '';
    }

    // ==================== 解析 JavaScript 代码为规则组 ====================
    function parseJavaScriptToGroups(code) {
      responseGroups = [];

      console.log('========== 开始解析 JavaScript 代码 ==========');

      // 判断规则类型：是否有 actionId 分支
      const hasActionId = /actionId\s*==\s*"/.test(code);

      if (hasActionId) {
        parseActionIdRule(code);
      } else {
        parseSimpleRule(code);
      }

      console.log(`\n========== 解析完成，共 ${responseGroups.length} 个规则组 ==========`);
    }

    // ==================== 解析 actionId 多分支规则 ====================
    function parseActionIdRule(code) {
      const lines = code.split('\n');
      const ifPositions = [];

      for (let i = 0; i < lines.length; i++) {
        const trimmed = lines[i].trim();
        const match = trimmed.match(/(?:else\s+)?if\s*\(\s*actionId\s*==\s*"([^"]+)"\s*\)/);
        if (match) {
          ifPositions.push({ lineIndex: i, actionId: match[1] });
        }
      }

      if (ifPositions.length === 0) return;

      ifPositions.forEach((pos, idx) => {
        const nextIdx = idx + 1 < ifPositions.length ? ifPositions[idx + 1].lineIndex : lines.length;
        const blockLines = lines.slice(pos.lineIndex + 1, nextIdx);

        const group = { name: '', actionId: pos.actionId, dataPath: '', fields: [] };

        // 查找组名注释
        for (const line of blockLines) {
          const nameMatch = line.match(/\/\/\s*===\s*(.+?)\s*===/);
          if (nameMatch) { group.name = nameMatch[1].trim(); break; }
        }
        if (!group.name) group.name = `规则 ${pos.actionId}`;

        // 合并连续行
        const mergedLines = [];
        for (let k = 0; k < blockLines.length; k++) {
          const line = blockLines[k].trim();
          const prevLine = mergedLines.length > 0 ? mergedLines[mergedLines.length - 1] : '';
          if (line && !prevLine.startsWith('//') && prevLine.endsWith('=') && !prevLine.endsWith(';')) {
            mergedLines[mergedLines.length - 1] += ' ' + line;
          } else {
            mergedLines.push(line);
          }
        }

        // 扫描变量声明
        const varMap = {};
        let firstVarDeclDataPath = '';
        for (const line of mergedLines) {
          const varDeclMatch = line.match(/const\s+(\w+)\s*=\s*res\.([\w]+)(?:\??\[\d+\])?/);
          if (varDeclMatch) {
            varMap[varDeclMatch[1]] = varDeclMatch[2];
            if (!firstVarDeclDataPath) firstVarDeclDataPath = varDeclMatch[2];
          }
        }
        if (firstVarDeclDataPath) group.dataPath = firstVarDeclDataPath;

        // 解析字段
        const processedLines = new Set();
        let fieldCount = 0;

        for (let k = 0; k < mergedLines.length; k++) {
          if (processedLines.has(k)) continue;
          const line = mergedLines[k];

          // 独立赋值: res.xxx.field = value;
          const standaloneMatch = line.match(/res\.([\w]+(?:\[\d+\])?(?:\.[\w]+(?:\[\d+\])?)*)\s*=\s*(.+?);/);
          if (standaloneMatch && !line.startsWith('//')) {
            const fullPath = standaloneMatch[1];
            let valueStr = standaloneMatch[2].trim().replace(/,$/, '');
            const isNumber = !valueStr.startsWith('"') && !valueStr.startsWith("'");
            if (!isNumber) valueStr = valueStr.replace(/^["']|["']$/g, '');

            const lastDotIndex = fullPath.lastIndexOf('.');
            const fieldName = lastDotIndex !== -1 ? fullPath.substring(lastDotIndex + 1) : fullPath;
            const dataPath = lastDotIndex !== -1 ? fullPath.substring(0, lastDotIndex) : '';

            if (fieldName === 'totalCount') { processedLines.add(k); continue; }
            if (Object.values(varMap).includes(fullPath)) { processedLines.add(k); continue; }

            fieldCount++;
            group.fields.push({ comment: '', name: fieldName, value: valueStr, type: isNumber ? 'number' : 'string', dataPath });
            processedLines.add(k);
            continue;
          }

          // 注释 + 赋值
          const fieldMatch = line.match(/\/\/\s*(.+?)$/);
          if (fieldMatch && !line.match(/\/\/\s*===\s*.+?\s*===/)) {
            const comment = fieldMatch[1].trim();
            let searchK = k + 1;
            while (searchK < mergedLines.length && !mergedLines[searchK].trim()) searchK++;
            if (searchK >= mergedLines.length) continue;

            const assignLine = mergedLines[searchK];
            let assignMatch = assignLine.match(/res\.([\w]+(?:\[\d+\])?(?:\.[\w]+(?:\[\d+\])?)*)\s*=\s*(.+?);/);

            if (!assignMatch) {
              const localVarMatch = assignLine.match(/(\w+)\.(\w+)\s*=\s*(.+?);/);
              if (localVarMatch && varMap[localVarMatch[1]]) {
                assignMatch = [null, varMap[localVarMatch[1]] + '.' + localVarMatch[2], localVarMatch[3]];
              }
            }

            let isInheritDataPath = false;
            if (!assignMatch) {
              const literalMatch = assignLine.match(/([\w]+)\s*:\s*(.+?),?$/);
              if (literalMatch) { assignMatch = literalMatch; isInheritDataPath = true; }
            }

            if (assignMatch) {
              const fullPath = assignMatch[1];
              let valueStr = assignMatch[2].trim().replace(/,$/, '');
              const isNumber = !valueStr.startsWith('"') && !valueStr.startsWith("'");
              if (!isNumber) valueStr = valueStr.replace(/^["']|["']$/g, '');

              const lastDotIndex = fullPath.lastIndexOf('.');
              let fieldName, dataPath;
              if (lastDotIndex !== -1) {
                fieldName = fullPath.substring(lastDotIndex + 1);
                dataPath = fullPath.substring(0, lastDotIndex);
              } else {
                fieldName = fullPath;
                dataPath = isInheritDataPath && group.dataPath ? group.dataPath : '';
              }

              fieldCount++;
              group.fields.push({ comment, name: fieldName, value: valueStr, type: isNumber ? 'number' : 'string', dataPath });
              processedLines.add(searchK);
              if (!group.dataPath && dataPath) group.dataPath = dataPath;
            }
          }
        }

        responseGroups.push(group);
      });
    }

    // ==================== 解析简单规则（无条件分支，如用户信息） ====================
    function parseSimpleRule(code) {
      const lines = code.split('\n');

      const group = {
        name: '字段修改',
        actionId: '',
        dataPath: '',
        fields: []
      };

      // 查找条件注释作为组名
      for (const line of lines) {
        const condMatch = line.match(/if\s*\((.+?)\)\s*\{/);
        if (condMatch) {
          group.name = `条件: ${condMatch[1].trim()}`;
          break;
        }
      }

      // 解析所有 res.xxx.yyy = value 赋值
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('//')) continue;

        const assignMatch = line.match(/res\.([\w]+(?:\.[\w]+)*)\s*=\s*(.+?);/);
        if (!assignMatch) continue;

        const fullPath = assignMatch[1];
        let valueStr = assignMatch[2].trim().replace(/,$/, '');
        const isNumber = !valueStr.startsWith('"') && !valueStr.startsWith("'");
        if (!isNumber) valueStr = valueStr.replace(/^["']|["']$/g, '');

        const lastDotIndex = fullPath.lastIndexOf('.');
        const fieldName = lastDotIndex !== -1 ? fullPath.substring(lastDotIndex + 1) : fullPath;
        const dataPath = lastDotIndex !== -1 ? fullPath.substring(0, lastDotIndex) : '';

        // 查找前面的注释作为字段说明
        let comment = '';
        for (let j = i - 1; j >= 0; j--) {
          const prevLine = lines[j].trim();
          if (prevLine.startsWith('//') && !prevLine.includes('===') && !prevLine.includes('console.log')) {
            comment = prevLine.replace(/^\/\/\s*/, '');
          }
          break;
        }

        group.fields.push({ comment, name: fieldName, value: valueStr, type: isNumber ? 'number' : 'string', dataPath });
        if (!group.dataPath && dataPath) group.dataPath = dataPath;
      }

      if (group.fields.length > 0) {
        responseGroups.push(group);
      }
    }

    // ==================== 更新导出按钮状态 ====================
    function updateExportButton() {
      const canExport = currentRuleIndex >= 0 && responseGroups.length > 0;
      document.getElementById('exportBtn').disabled = !canExport;
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() {
      loadRules();
    });
  </script>
</body>
